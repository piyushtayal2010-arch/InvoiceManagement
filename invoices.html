<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoices</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="app-nav">
    <div class="nav-wrapper container">
      <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
        <i class="material-icons">menu</i>
      </button>
      <a href="#" class="brand-logo">Invoice Workspace</a>
    </div>
  </nav>

  <div class="app-shell">
    <aside class="sidebar">
      <a href="index.html"><i class="material-icons">receipt_long</i><span>Invoice Builder</span></a>
      <a href="invoices.html" class="active-link"><i class="material-icons">history</i><span>Invoices</span></a>
      <a href="clients.html"><i class="material-icons">groups</i><span>Clients</span></a>
      <a href="services.html"><i class="material-icons">inventory_2</i><span>Services</span></a>
      <a href="settings.html"><i class="material-icons">tune</i><span>Settings</span></a>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h4>Past Invoices</h4>
        <p>Review invoices you have generated and remove records when needed.</p>
      </div>

      <div class="card">
        <div class="card-content">
          <span class="card-title">Invoice History</span>
          <div class="invoice-items-wrap">
            <table class="striped">
              <thead>
                <tr>
                  <th>Invoice No</th>
                  <th>Date</th>
                  <th>Client</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="invoiceHistoryBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="invoices.js"></script>
  <script src="nav.js"></script>
</body>
</html>
